<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Projeto Agrinho</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Projeto Agrinho</h1>
    <p>Educação, Cidadania e Meio Ambiente</p>
  </header>
 
  <main>
    <section class="intro">
      <h2>Bem-vindo ao Agrinho!</h2>
      <p>Um programa educacional que ensina sustentabilidade e cidadania para crianças e jovens.</p>
    </section>

    <section class="galeria">
      <h2>Galeria de Fotos</h2>
      <div class="grid">
        <img src="images/plantio.jpg" alt="Crianças plantando árvores">
        <img src="images/lago.jpg" alt="Paisagem natural com lago">
        <img src="images/campo.jpg" alt="Plantação ao pôr do sol">
      </div>
      <p>Descobrindo a Natureza!</p>
      <button onclick="saibaMais()">Saiba Mais</button>
    </section>
  </main>

  <footer>
    <p>Desenvolvido em Visual Studio Code</p>
  </footer>
 
  <script src="script.js"></script>
</body>
</html>
